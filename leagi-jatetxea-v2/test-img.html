<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Test imágenes</title>
<style>
body { font-family: sans-serif; padding: 40px; background: #1a1a1a; color: #fff; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
.col { background: #2a2a2a; padding: 20px; border-radius: 12px; }
img { width: 100%; height: auto; display: block; border-radius: 8px; background: #444; min-height: 300px; }
h2 { font-size: 1.4rem; margin-bottom: 10px; }
.tag { display: inline-block; background: #ff6b1a; color: #000; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: 700; margin-bottom: 10px; }
</style></head>
<body>
<h1>¿Cuál es la imagen del comedor de Leagi?</h1>
<p>Mírale, dime A o B y la dejo fija en la web.</p>
<div class="row">
  <div class="col">
    <span class="tag">A</span>
    <h2>comedor-A.avif (747 KB)</h2>
    <img src="comedor-A.avif" alt="Candidata A">
  </div>
  <div class="col">
    <span class="tag">B</span>
    <h2>comedor-B.avif (437 KB)</h2>
    <img src="comedor-B.avif" alt="Candidata B">
  </div>
</div>
</body></html>
